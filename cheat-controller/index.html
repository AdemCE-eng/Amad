<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 Cheat Controller — المرافق المالي الذكي</title>
  <style>
    :root {
      --alinma: #6b3fa0;      /* Alinma purple */
      --alinma-dark: #4e2d78;
      --green: #1faa59;
      --red: #d64545;
      --amber: #e0a500;
      --bg: #f5f3f9;
      --card: #ffffff;
      --ink: #2a2340;
      --teal: #0e9488;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg); color: var(--ink);
      margin: 0; padding: 24px; min-height: 100vh;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 { color: var(--alinma-dark); font-size: 1.4rem; margin: 0 0 4px; }
    .sub { color: #777; font-size: .85rem; margin-bottom: 20px; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .action { display: flex; gap: 6px; }
    .amt {
      width: 88px; flex: none; border: 1px solid #ddd; border-radius: 10px;
      padding: 0 8px; font-size: .95rem; text-align: center; color: var(--ink);
    }
    .amt.pct { width: 56px; }
    button {
      border: none; border-radius: 14px; padding: 14px 10px; flex: 1;
      font-size: .95rem; font-weight: 700; color: #fff; cursor: pointer;
      transition: transform .06s ease, filter .15s ease;
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }
    button:active { transform: scale(.97); }
    button:hover { filter: brightness(1.05); }
    .salary   { background: var(--green); }
    .save     { background: var(--teal); }
    .coffee   { background: var(--alinma); }
    .big      { background: var(--amber); }
    .emergency{ background: #2f7fd6; }
    .reset    { background: var(--red); grid-column: 1 / -1; padding: 18px 16px; }
    .status {
      margin-top: 20px; background: var(--card); border-radius: 16px;
      padding: 16px; box-shadow: 0 4px 12px rgba(0,0,0,.06);
    }
    .row { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; }
    .bar { height: 14px; border-radius: 8px; background: #eee; overflow: hidden; flex: 1; margin: 0 10px; }
    .bar > span { display: block; height: 100%; background: var(--green); transition: width .4s ease; }
    .bubble {
      background: #f0ebfa; border-radius: 14px; padding: 12px 14px;
      margin-top: 10px; font-size: 1.05rem; text-align: center; min-height: 24px;
    }
    .badge { font-size: .8rem; padding: 3px 10px; border-radius: 999px; background: #eee; }
    .settings { display: flex; gap: 6px; margin-bottom: 16px; }
    .settings .amt { width: auto; flex: 1; }
    .goalset { background: var(--alinma-dark); flex: none; padding: 0 16px; }
    .errBanner {
      display: none; margin-top: 10px; background: #fdeaea; color: var(--red);
      border-radius: 12px; padding: 10px 14px; text-align: center; font-weight: 700;
    }
    pre {
      margin-top: 14px; background: #1e1b2e; color: #c8e6c9; border-radius: 12px;
      padding: 12px; font-size: .72rem; overflow-x: auto; direction: ltr; max-height: 180px;
    }
    .emoji { font-size: 2.4rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🎮 لوحة التحكم السرية — Cheat Controller</h1>
    <div class="sub">اضغط الأزرار لتحديث Firebase مباشرة — يتفاعل الحيوان الأليف فوراً على شاشة التطبيق.</div>

    <div class="settings">
      <input class="amt" type="number" id="goalInput" value="5000" min="1" step="100" placeholder="هدف الادخار (ر.س)">
      <button class="goalset" onclick="setGoal()">🎯 تحديث هدف الادخار</button>
    </div>

    <div class="actions">
      <div class="action">
        <input class="amt" type="number" id="amt-salary" value="8000" min="0" step="50">
        <input class="amt pct" type="number" id="pct-salary" value="20" min="0" max="100" step="5" title="نسبة الادخار التلقائي %">
        <button class="salary" onclick="callSalary()">💰 إيداع راتب</button>
      </div>
      <div class="action">
        <input class="amt" type="number" id="amt-save" value="300" min="0" step="50">
        <button class="save" onclick="callAmt('save', '/api/simulate/save', 'amt-save')">💚 مدخرات فورية</button>
      </div>
      <div class="action">
        <input class="amt" type="number" id="amt-coffee" value="50" min="0" step="10">
        <button class="coffee" onclick="callAmt('coffee', '/api/simulate/purchase', 'amt-coffee')">☕ شراء قهوة</button>
      </div>
      <div class="action">
        <input class="amt" type="number" id="amt-big" value="2500" min="0" step="100">
        <button class="big" onclick="callAmt('big', '/api/simulate/purchase', 'amt-big')">🛍️ شراء كبير</button>
      </div>
      <div class="action">
        <input class="amt" type="number" id="amt-emergency" value="1500" min="0" step="100">
        <button class="emergency" onclick="callAmt('emergency', '/api/simulate/emergency', 'amt-emergency')">🛡️ درع الطوارئ</button>
      </div>
      <button class="reset" onclick="call('/api/reset', {})">🔄 إعادة تعيين العرض (Panic Reset)</button>
    </div>

    <div class="status">
      <div style="text-align:center">
        <div class="emoji" id="emoji">🐣</div>
        <span class="badge" id="mood">—</span>
      </div>
      <div class="row"><span>الصحة</span><div class="bar"><span id="healthBar" style="width:100%"></span></div><b id="healthNum">—</b></div>
      <div class="row"><span>التقدم نحو الهدف</span><div class="bar"><span id="goalBar" style="width:0%; background:var(--alinma)"></span></div><b id="goalNum">—</b></div>
      <div class="row"><span>درع الطوارئ المتبقي</span><b id="shield">—</b></div>
      <div class="bubble" id="bubble">…</div>
      <div style="text-align:center"><span class="badge" id="aiBadge">—</span></div>
      <div class="errBanner" id="errBanner"></div>
      <pre id="raw">اضغط أي زر لعرض الاستجابة…</pre>
    </div>
  </div>

  <script>
    const EMOJI = { happy: '😄', neutral: '🙂', sad: '😟', sick: '🤒' };

    // Relative URLs only resolve when this page is served BY the backend
    // (http://localhost:3000/). If it's opened directly (file://) or previewed
    // from elsewhere, fall back to the backend's default local address.
    const API_BASE = location.protocol === 'file:' || !location.origin.startsWith('http')
      ? 'http://localhost:3000'
      : '';

    // Each action button reads its own amount input so demo operators (or
    // judges) can drive custom scenarios instead of only fixed values.
    function buildBody(kind, amount) {
      switch (kind) {
        case 'save': return { amount };
        case 'coffee': return { amount, category: 'coffee', label: 'قهوة' };
        case 'big': return { amount, category: 'shopping', label: 'تسوق كبير' };
        case 'emergency': return { amount, label: 'طوارئ طبية' };
        default: return { amount };
      }
    }

    function callAmt(kind, path, inputId) {
      const raw = Number(document.getElementById(inputId).value);
      const amount = Number.isFinite(raw) ? Math.max(0, Math.round(raw)) : 0;
      call(path, buildBody(kind, amount));
    }

    // Salary is the one action with a second input: the % of the deposit
    // that auto-routes to Instant Savings (choosable per click).
    function callSalary() {
      const rawAmount = Number(document.getElementById('amt-salary').value);
      const rawPct = Number(document.getElementById('pct-salary').value);
      const amount = Number.isFinite(rawAmount) ? Math.max(0, Math.round(rawAmount)) : 0;
      const savePercent = Number.isFinite(rawPct) ? Math.min(100, Math.max(0, Math.round(rawPct))) : 20;
      call('/api/simulate/salary', { amount, savePercent });
    }

    function setGoal() {
      const raw = Number(document.getElementById('goalInput').value);
      const goalAmount = Number.isFinite(raw) ? Math.max(1, Math.round(raw)) : 0;
      call('/api/user/goal', { goalAmount });
    }

    async function call(path, body) {
      setBusy(true);
      try {
        const res = await fetch(API_BASE + path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        render(data);
      } catch (e) {
        document.getElementById('raw').textContent = '❌ ' + e.message +
          '\n(تأكد أن الخادم يعمل: npm run dev)';
      } finally {
        setBusy(false);
      }
    }

    function render(data) {
      document.getElementById('raw').textContent = JSON.stringify(data, null, 2);

      const errBanner = document.getElementById('errBanner');
      if (data.ok === false) {
        errBanner.textContent = '⚠️ ' + (data.message || 'حدث خطأ غير متوقع.');
        errBanner.style.display = 'block';
      } else {
        errBanner.style.display = 'none';
      }

      const pet = data.pet, user = data.user, shield = data.emergencyShield;
      if (pet) {
        document.getElementById('emoji').textContent = EMOJI[pet.mood] || '🐣';
        document.getElementById('mood').textContent = pet.mood;
        document.getElementById('healthNum').textContent = pet.health;
        document.getElementById('healthBar').style.width = pet.health + '%';
        document.getElementById('healthBar').style.background =
          pet.health >= 50 ? 'var(--green)' : pet.health >= 20 ? 'var(--amber)' : 'var(--red)';
        document.getElementById('bubble').textContent = pet.message || '…';
      }

      // Makes it obvious whether this reply came from a real Gemini call, the
      // mock-mode fallback (USE_MOCK_AI=true), or the emergency fallback
      // (Gemini errored/timed out) — otherwise all three look identical.
      const aiBadge = document.getElementById('aiBadge');
      const AI_LABELS = {
        gemini: ['🤖 رد Gemini حقيقي', '#e6f7f0', '#0e9488'],
        mock: ['📋 وضع تجريبي (Mock)', '#f0ebfa', '#6b3fa0'],
        fallback: ['⚠️ احتياطي (فشل Gemini)', '#fdeaea', '#d64545'],
      };
      if (data.aiSource && AI_LABELS[data.aiSource]) {
        const [label, bg, fg] = AI_LABELS[data.aiSource];
        aiBadge.textContent = label;
        aiBadge.style.background = bg;
        aiBadge.style.color = fg;
        aiBadge.style.display = 'inline-block';
      } else {
        aiBadge.style.display = 'none';
      }

      if (user) {
        const pct = Math.min(100, Math.round(user.savedAmount / user.goalAmount * 100));
        document.getElementById('goalBar').style.width = pct + '%';
        document.getElementById('goalNum').textContent = pct + '%';
        document.getElementById('goalInput').value = user.goalAmount;
      }
      if (shield) document.getElementById('shield').textContent = shield.usesRemaining;
    }

    function setBusy(b) { document.body.style.opacity = b ? .6 : 1; }

    // Load initial state on open.
    fetch(API_BASE + '/api/state').then(r => r.json()).then(render).catch(() => {});
  </script>
</body>
</html>
